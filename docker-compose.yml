services:
  postgres:
    image: postgres:15-alpine
    container_name: lightspeed-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      POSTGRES_DB: ${DATABASE_NAME:-lightspeed_sync}
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lightspeed-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Lightspeed OAuth2 Credentials
      LIGHTSPEED_API_URL: ${LIGHTSPEED_API_URL:-https://api.lightspeedapp.com}
      LIGHTSPEED_OAUTH_URL: ${LIGHTSPEED_OAUTH_URL:-https://cloud.lightspeedapp.com/oauth/access_token.php}
      LIGHTSPEED_CLIENT_ID: ${LIGHTSPEED_CLIENT_ID}
      LIGHTSPEED_CLIENT_SECRET: ${LIGHTSPEED_CLIENT_SECRET}
      LIGHTSPEED_REFRESH_TOKEN: ${LIGHTSPEED_REFRESH_TOKEN}
      LIGHTSPEED_ACCOUNT_ID: ${LIGHTSPEED_ACCOUNT_ID}
      # Database Configuration - usar el nombre del servicio postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_NAME: ${DATABASE_NAME:-lightspeed_sync}
      DATABASE_USER: ${DATABASE_USER:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      # Scheduler Configuration
      POLLING_INTERVAL_HOURS: ${POLLING_INTERVAL_HOURS:-3}
      POLLING_CRON_EXPRESSION: ${POLLING_CRON_EXPRESSION:-0 */3 * * *}
      # Rate Limiting
      RATE_LIMIT_REQUESTS_PER_MINUTE: ${RATE_LIMIT_REQUESTS_PER_MINUTE:-60}
      RATE_LIMIT_BACKOFF_MS: ${RATE_LIMIT_BACKOFF_MS:-1000}
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # CONTPAQi Configuration (opcional)
      CONTAPAQI_API_URL: ${CONTAPAQI_API_URL}
      CONTAPAQI_USERNAME: ${CONTAPAQI_USERNAME}
      CONTAPAQI_PASSWORD: ${CONTAPAQI_PASSWORD}
    volumes:
      - ./logs:/app/logs
    networks:
      - lightspeed-network

networks:
  lightspeed-network:
    driver: bridge

volumes:
  postgres_data:
